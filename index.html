<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Print Store | Produtos Personalizados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <a href="#" class="logo">Custom<span>Print</span>.</a>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar produtos...">
                <button><i class="fas fa-search"></i></button>
            </div>

            <div class="nav-icons">
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container hero-content">
            <h1>Transforme ideias em realidade.</h1>
            <p>Personalizados exclusivos para sua empresa, eventos e presentes.</p>
            <a href="#produtos" class="btn-primary">Ver Catálogo</a>
        </div>
    </section>

    <main class="container" id="produtos">
        
        <div class="category-filter">
            <button class="filter-btn active" onclick="filterProducts('todos')">Todos</button>
            <button class="filter-btn" onclick="filterProducts('papelaria')">Papelaria</button>
            <button class="filter-btn" onclick="filterProducts('personalizados')">Personalizados</button>
            <button class="filter-btn" onclick="filterProducts('eventos')">Eventos</button>
        </div>

        <div id="product-grid" class="product-grid">
            </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Custom Print Store. Todos os direitos reservados.</p>
        </div>
    </footer>

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modal-img" src="" alt="Produto">
                </div>
                <div class="modal-info">
                    <h2 id="modal-title">Nome do Produto</h2>
                    <p id="modal-price" class="price">R$ 0,00</p>
                    <p id="modal-desc">Descrição do produto.</p>
                    
                    <div id="modal-variations" class="variations-container">
                        </div>

                    <div class="modal-actions">
                        <button class="btn-primary" onclick="addToCartFromModal()">Adicionar ao Carrinho</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items">
            </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total Estimado:</span>
                <span id="cart-total-price">R$ 0,00</span>
            </div>
            <button class="btn-whatsapp" onclick="checkoutWhatsApp()">
                <i class="fab fa-whatsapp"></i> Finalizar no WhatsApp
            </button>
        </div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleCart()"></div>

    <script src="js/script.js"></script>
</body>
</html>
